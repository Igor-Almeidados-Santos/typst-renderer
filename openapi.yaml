openapi: 3.0.3
info:
  title: Typst Renderer API
  version: "4.1.0"
  description: Minimal action schema for template listing and wrapped PDF rendering.

servers:
  - url: https://tintless-debasedly-tina.ngrok-free.dev

paths:
  /health:
    get:
      operationId: healthCheck
      summary: Health check
      x-openai-isConsequential: false
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string

  /templates:
    get:
      operationId: getTemplates
      summary: List available templates
      x-openai-isConsequential: false
      responses:
        "200":
          description: Templates loaded
          content:
            application/json:
              schema:
                type: object
                required:
                  - templates
                  - default
                properties:
                  templates:
                    type: array
                    items:
                      type: string
                  default:
                    type: string
        "500":
          description: Server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string

  /render-pdf-wrapped:
    post:
      operationId: renderPdfWrapped
      summary: Render one PDF using Typst (wrapped payload)
      x-openai-isConsequential: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - template_id
                - payload
              properties:
                template_id:
                  type: string
                  enum: [livro_tecnico_v2]
                payload:
                  type: object
                  required:
                    - document
                  properties:
                    document:
                      type: object
                      required:
                        - metadata
                        - content
                      properties:
                        metadata:
                          type: object
                          additionalProperties: true
                        content:
                          type: array
                          items:
                            type: object
                            additionalProperties: true
                    options:
                      type: object
                      properties:
                        paper_size:
                          type: string
                          default: A4
                        pdf_standard:
                          type: string
      responses:
        "200":
          description: PDF rendered
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - file_url
                  - warnings
                properties:
                  success:
                    type: boolean
                  file_url:
                    type: string
                  warnings:
                    type: array
                    items:
                      type: string
        "400":
          description: Invalid payload or template not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
        "500":
          description: Render error
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
