openapi: 3.1.0
info:
  title: Typst Renderer API
  version: "4.0.0"
  description: >
    Minimal schema for the Custom GPT flow:
    - get templates
    - render PDFs via wrapped payload
    No cover generation/upload in the API.

servers:
  - url: https://tintless-debasedly-tina.ngrok-free.dev

paths:
  /health:
    get:
      operationId: healthCheck
      summary: Health check
      x-openai-isConsequential: false
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /templates:
    get:
      operationId: getTemplates
      summary: List available templates
      x-openai-isConsequential: false
      responses:
        "200":
          description: Templates loaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplatesResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /render-pdf-wrapped:
    post:
      operationId: renderPdfWrapped
      summary: Render one PDF using Typst (wrapped payload)
      x-openai-isConsequential: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenderRequestWrapped"
      responses:
        "200":
          description: PDF rendered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RenderResponse"
        "400":
          description: Invalid payload or template not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Render error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string

    TemplatesResponse:
      type: object
      required:
        - templates
        - default
      properties:
        templates:
          type: array
          items:
            type: string
        default:
          type: string

    RenderOptions:
      type: object
      properties:
        paper_size:
          type: string
          default: A4
        pdf_standard:
          type: string

    RenderWrappedPayload:
      type: object
      required:
        - document
      properties:
        document:
          $ref: "#/components/schemas/RenderDocument"
        options:
          $ref: "#/components/schemas/RenderOptions"

    RenderRequestWrapped:
      type: object
      required:
        - template_id
        - payload
      properties:
        template_id:
          type: string
          description: Only livro_tecnico_v2 is supported.
          enum: [livro_tecnico_v2]
        payload:
          $ref: "#/components/schemas/RenderWrappedPayload"

    RenderDocument:
      type: object
      required:
        - metadata
        - content
      properties:
        metadata:
          type: object
          additionalProperties: true
        content:
          type: array
          maxItems: 80
          items:
            $ref: "#/components/schemas/RenderBlock"

    RenderBlock:
      oneOf:
        - $ref: "#/components/schemas/HeadingBlock"
        - $ref: "#/components/schemas/ParagraphBlock"
        - $ref: "#/components/schemas/ListBlock"
        - $ref: "#/components/schemas/CodeBlock"
        - $ref: "#/components/schemas/TableBlock"
        - $ref: "#/components/schemas/PagebreakBlock"

    HeadingBlock:
      type: object
      required: [type, level, text]
      properties:
        type:
          type: string
          enum: [heading]
        level:
          type: integer
          minimum: 1
          maximum: 3
        text:
          type: string
          maxLength: 400
      additionalProperties: false

    ParagraphBlock:
      type: object
      required: [type, text]
      properties:
        type:
          type: string
          enum: [paragraph]
        text:
          type: string
          maxLength: 2500
      additionalProperties: false

    ListBlock:
      type: object
      required: [type, items]
      properties:
        type:
          type: string
          enum: [list]
        items:
          type: array
          maxItems: 40
          items:
            type: string
            maxLength: 400
      additionalProperties: false

    CodeTheme:
      type: object
      properties:
        bg:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
        border:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
        header_bg:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
        header_text:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
        text:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
        line_number:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
        keyword:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
        string:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
        comment:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
        number:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
        function:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
        operator:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
        plain:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
      additionalProperties: false

    CodeBlock:
      type: object
      required: [type, lang, content]
      properties:
        type:
          type: string
          enum: [code]
        lang:
          type: string
          maxLength: 40
        content:
          type: string
          maxLength: 4000
        theme:
          $ref: "#/components/schemas/CodeTheme"
        tema:
          $ref: "#/components/schemas/CodeTheme"
      additionalProperties: false

    TableBlock:
      type: object
      required: [type, columns, rows]
      properties:
        type:
          type: string
          enum: [table]
        caption:
          type: string
          maxLength: 200
        columns:
          type: array
          minItems: 1
          maxItems: 8
          items:
            type: string
            maxLength: 80
        rows:
          type: array
          maxItems: 100
          items:
            type: array
            minItems: 1
            maxItems: 8
            items:
              type: string
              maxLength: 400
      additionalProperties: false

    PagebreakBlock:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [pagebreak]
      additionalProperties: false

    RenderResponse:
      type: object
      required:
        - success
        - file_url
        - warnings
      properties:
        success:
          type: boolean
        file_url:
          type: string
        warnings:
          type: array
          items:
            type: string

    ErrorResponse:
      type: object
      required:
        - detail
      properties:
        detail:
          type: string
